<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <div class="player-card">
            <div class="disc-cover">🎵</div>
            <div class="track-info">
                <h3 id="track-title">Track Title</h3>
                <p id="track-artist">Artist Name</p>
            </div>
            
            <div class="controls">
                <button id="prev-btn" class="ctrl-btn">◁</button>
                <button id="play-btn" class="ctrl-btn main-btn">▶</button>
                <button id="next-btn" class="ctrl-btn">▷</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
